<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asnowco Publication</title>
    <meta name="description" content="Asnowco publication. Text or call (801) 682-4186 for a cash offer." />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" href="./400pxflake.png" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" data-header>
      <div class="container header-inner">
        <a class="brand" href="./index.html" aria-label="Asnowco home">
          <img class="brand-logo" src="./banner.png" alt="Asnowco" />
        </a>

        <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-controls="site-nav">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="sr-only">Toggle navigation</span>
        </button>

        <nav class="site-nav" id="site-nav" data-nav>
          <a href="./index.html#why">Why Asnowco</a>
          <a href="./index.html#team">Team</a>
          <a href="./blog.html">Publications</a>
          <a href="./index.html#contact">Contact</a>
          <a class="nav-crm" href="https://crm.asnowco.com">SnowBumpCRM</a>
        </nav>

        <div class="header-cta">
          <a class="btn btn-ghost btn-crm" href="https://crm.asnowco.com">SnowBumpCRM</a>
          <a class="btn btn-ghost" href="./blog.html">Back</a>
          <a class="btn btn-ghost" href="sms:+18016824186">Text</a>
          <a class="btn btn-primary" href="tel:+18016824186">Call</a>
        </div>
      </div>
    </header>

    <main id="main">
      <section class="section" aria-label="Publication">
        <div class="container">
          <article class="post" data-post>
            <div class="post-top">
              <a class="post-back" href="./blog.html">← All publications</a>
              <div class="post-meta" data-post-meta></div>
            </div>
            <h1 class="post-title" data-post-title></h1>
            <div class="post-media" aria-hidden="true">
              <img class="post-media-img" data-post-image alt="" loading="lazy" />
            </div>
            <div class="post-content" data-post-content></div>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-brand">
          <img class="footer-flake" src="./400pxflake.png" alt="" aria-hidden="true" />
          <div>
            <div class="footer-title">Asnowco LLC</div>
            <div class="muted small">We buy houses for cash</div>
          </div>
        </div>
        <div class="footer-links">
          <a href="./index.html#how">How it works</a>
          <a href="./index.html#why">Why Asnowco</a>
          <a href="./index.html#team">Team</a>
          <a href="./index.html#contact">Contact</a>
        </div>
        <div class="muted small">© <span data-year></span> Asnowco. All rights reserved.</div>
      </div>
    </footer>

    <div class="sticky-cta" aria-label="Sticky call to action">
      <div class="container sticky-cta-inner">
        <div class="sticky-cta-copy">
          <div class="sticky-cta-title">Text or call for a cash offer</div>
          <div class="sticky-cta-sub">(801) 682-4186</div>
        </div>
        <div class="sticky-cta-actions">
          <a class="btn btn-primary" href="sms:+18016824186">Text</a>
          <a class="btn btn-ghost" href="tel:+18016824186">Call</a>
        </div>
      </div>
    </div>

    <script src="./js/main.js"></script>
  </body>
</html>
